candidate:
  # Universe definition identity
  name: candidate
  version: "v1"

  # Exchanges accepted as listing venues.
  # Strings must match what SEC reports in the submissions feed.
  supported_exchanges:
    - Nasdaq
    - NYSE
    - NYSE American

  # Maps raw SEC exchange strings to canonical names in supported_exchanges.
  # Any raw value absent from this map is treated as unsupported.
  exchange_aliases:
    Nasdaq: Nasdaq
    NASDAQ: Nasdaq
    NasdaqCM: Nasdaq
    NasdaqGM: Nasdaq
    NasdaqGS: Nasdaq
    NYSE: NYSE
    "New York Stock Exchange": NYSE
    NYSE American: NYSE American
    NYSEAMER: NYSE American
    AMEX: NYSE American
    "NYSE MKT": NYSE American

  # Only companies with one of these entity_type values are included (case-insensitive).
  allowed_entity_types:
    - operating

  # Companies whose entity_type exactly matches these values get the specific
  # 'excluded_entity_type' reason code (still excluded, but with more detail).
  excluded_exact_entity_types:
    - investment-manager
    - pooled-investment-fund
    - limited-partnership
    - blank-check
    - special-purpose-acquisition-company
    - other-spac

  # Exclude companies with NULL entity_type to avoid including unclassified shells.
  exclude_missing_entity_type: true

  # Require at least one currently-observed SEC ticker for the company.
  require_current_ticker: true

  # Require a CompanyDataProfile row for the configured profile_version.
  require_company_data_profile: true

  # Exclude companies whose most recent SEC filing is older than this many months.
  recent_filing_months: 18

  # Exclude companies with NULL latest_filing_date (no known filing history).
  exclude_missing_recent_filing: true

  # SIC codes associated with investment vehicles, holding shells, and blank-check companies.
  # These supplement entity_type checks — some funds file as "operating".
  excluded_sic_codes:
    - "6726"  # Investment Offices, NEC (holding companies, blank-check shells)
    - "6770"  # Blank Checks
    - "6189"  # Asset-backed Securities
    - "6199"  # Finance Services (generic catch-all for unclassified financials)
    - "6321"  # Hospital and Medical Service Plans (some fund structures)
    - "6371"  # Pension, Health, and Welfare Funds

  # Python regex patterns (re.IGNORECASE) matched against legal_name.
  # First match short-circuits; reason code = excluded_name_pattern.
  excluded_name_patterns:
    - "\\bETF\\b"
    - "\\bSPAC\\b"
    - "(?:acquisition|acq)\\.?\\s+corp"
    - "blank check"
    - "\\bfund\\b"
    - "\\btrust\\b(?!\\s+company)"

  # CIKs always excluded regardless of other criteria (hard block, zero exceptions).
  always_exclude_ciks: []

  # CIKs always included even if one or more checks would normally exclude them.
  # Waived exclusion reasons are still recorded in the membership row for observability.
  always_include_ciks: []

  # Profile version string used to match company_data_profiles rows produced by the
  # companyfacts_data_profiles asset.
  profile_version: companyfacts_profile_v1

# ── Training universe ──────────────────────────────────────────────────────────
#
# V1 SURVIVORSHIP-BIAS NOTE
# This universe is constructed from currently observable public companies and
# securities. It is suitable for initial pipeline and model development but is
# not a fully survivorship-bias-free historical universe. A later enhancement
# should ingest delisted securities, historical ticker intervals, and
# point-in-time membership.

training:
  name: training_universe
  version: "v1"

  # Source universe: only companies with an active candidate membership are evaluated.
  candidate_universe:
    name: candidate
    version: "v1"

  # Profile versions that must match persisted profile rows.
  company_data_profile_version: companyfacts_profile_v1
  market_profile_version: market_profile_v1

  # Minimum XBRL financial reporting periods required.
  minimum_annual_periods: 3
  minimum_quarterly_periods: 0

  # Minimum fraction of canonical metrics that must be present (0.0 – 1.0).
  minimum_canonical_metric_coverage: 0.80

  # Market and investability thresholds for the selected security.
  minimum_price_history_years: 3
  minimum_median_daily_dollar_volume: 2000000
  maximum_missing_trading_day_ratio: 0.02

  # Maximum age of market profile before it is considered stale.
  maximum_market_profile_age_days: 45

  # Quality gates on the market profile row itself.
  require_market_profile_status: success
  require_latest_adjusted_close: true

  # Optional market-cap floor. Set to null to disable.
  # Market cap is informational when null — a company is NOT excluded merely
  # because current_market_cap IS NULL (Tiingo Fundamentals may be incomplete).
  minimum_market_cap: null

# ── Scoring universe ───────────────────────────────────────────────────────────

scoring:
  name: scoring_universe
  version: "v1"

  # Source universe: only companies with an active training membership are evaluated.
  training_universe:
    name: training_universe
    version: "v1"

  # Model buckets (defined in sic_buckets_v1.yaml) whose SIC codes qualify a company
  # for scoring. A company matching any listed bucket is included.
  included_model_buckets:
    - semiconductors
    - software_and_data
    - networking_and_hardware
    - fintech_and_capital_markets
    - automation_and_instruments
    - power_and_grid

  # Manual inclusions bypass the SIC / model-bucket requirement only.
  # They do NOT bypass candidate eligibility, data-quality, or market-data rules.
  # Prefer CIKs for durable configuration; tickers are resolved at run time against
  # the selected training-universe security and fail if ambiguous.
  manual_include_ciks: []
  manual_include_tickers:
    - COIN
    - NVDA
    - AMD
    - AVGO
    - MSFT
    - GOOGL
    - META
    - AMZN
    - CRWD
    - PLTR
    - HOOD
    - MSTR

  # Manual exclusions always win over bucket matches and manual inclusions.
  manual_exclude_ciks: []
  manual_exclude_tickers: []
