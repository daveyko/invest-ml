# 16 canonical financial metrics with normalization rules.
# available_at = filed_date (point-in-time invariant).
# Amendments are preserved as separate rows indexed by available_at.

version: canonical_metrics_v1

defaults:
  annual_forms:
    - 10-K
    - 10-K/A
    - 20-F
    - 20-F/A
    - 40-F
    - 40-F/A
  quarterly_forms:
    - 10-Q
    - 10-Q/A
  annual_duration_days:
    min: 300
    max: 430
  quarterly_duration_days:
    min: 60
    max: 120

metrics:
  # ─── Duration (flow) metrics ─────────────────────────────────────────────────

  revenue:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: RevenueFromContractWithCustomerExcludingAssessedTax
        priority: 1
      - taxonomy: us-gaap
        tag: Revenues
        priority: 2
      - taxonomy: us-gaap
        tag: SalesRevenueNet
        priority: 3

  gross_profit:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: GrossProfit
        priority: 1

  operating_income:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: OperatingIncomeLoss
        priority: 1

  net_income:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: NetIncomeLoss
        priority: 1
      - taxonomy: us-gaap
        tag: ProfitLoss
        priority: 2

  operating_cash_flow:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: NetCashProvidedByUsedInOperatingActivities
        priority: 1

  capital_expenditures:
    period_kind: duration
    expected_units: [USD]
    # XBRL PaymentsTo* tags are positive amounts (cash outflows stated as absolute
    # values). Canonical value >= 0 means cash spent. No sign flip applied.
    concepts:
      - taxonomy: us-gaap
        tag: PaymentsToAcquirePropertyPlantAndEquipment
        priority: 1
      - taxonomy: us-gaap
        tag: PaymentsForAdditionsToPropertyPlantAndEquipment
        priority: 2

  research_and_development_expense:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: ResearchAndDevelopmentExpense
        priority: 1

  stock_based_compensation:
    period_kind: duration
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: ShareBasedCompensation
        priority: 1
      - taxonomy: us-gaap
        tag: AllocatedShareBasedCompensationExpense
        priority: 2

  diluted_weighted_average_shares:
    period_kind: duration
    expected_units: [shares]
    concepts:
      - taxonomy: us-gaap
        tag: WeightedAverageNumberOfDilutedSharesOutstanding
        priority: 1

  # ─── Instant (balance-sheet) metrics ─────────────────────────────────────────

  cash_and_cash_equivalents:
    period_kind: instant
    expected_units: [USD]
    # Priority 1 excludes restricted cash; priority 2 includes it.
    # Prefer the narrower definition; derivation records which tag was selected.
    concepts:
      - taxonomy: us-gaap
        tag: CashAndCashEquivalentsAtCarryingValue
        priority: 1
      - taxonomy: us-gaap
        tag: CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents
        priority: 2

  debt_current:
    period_kind: instant
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: ShortTermBorrowings
        priority: 1
      - taxonomy: us-gaap
        tag: LongTermDebtCurrent
        priority: 2

  long_term_debt:
    period_kind: instant
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: LongTermDebtNoncurrent
        priority: 1
      - taxonomy: us-gaap
        tag: LongTermDebt
        priority: 2

  total_assets:
    period_kind: instant
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: Assets
        priority: 1

  total_liabilities:
    period_kind: instant
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: Liabilities
        priority: 1

  stockholders_equity:
    period_kind: instant
    expected_units: [USD]
    concepts:
      - taxonomy: us-gaap
        tag: StockholdersEquity
        priority: 1
      - taxonomy: us-gaap
        tag: StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest
        priority: 2

  shares_outstanding:
    period_kind: instant
    expected_units: [shares]
    # dei:EntityCommonStockSharesOutstanding requires the xbrl_facts flattener
    # to process the dei taxonomy. Coverage is 0 until xbrl_facts is
    # re-materialized with the updated registry.
    concepts:
      - taxonomy: dei
        tag: EntityCommonStockSharesOutstanding
        priority: 1

# Profiling configuration used during the companyfacts_data_profiles scan.
# Defines the 7 coverage metrics, accepted SEC form types, and concept
# (taxonomy + tag + unit) mappings for each profiling metric.
profiling:
  # Seven metrics required for canonical_metric_coverage = n_present / 7.
  required_metrics:
    - revenue
    - operating_income
    - net_income
    - operating_cash_flow
    - cash
    - debt
    - shares

  # Filing form types used to count unique annual/quarterly periods.
  annual_forms:
    - 10-K
    - 10-K/A
    - 20-F
    - 20-F/A
    - 40-F
    - 40-F/A
  quarterly_forms:
    - 10-Q
    - 10-Q/A

  # Per-profiling-metric accepted concepts.  Order is significant: first
  # matching concept wins if multiple tags coexist in the same payload.
  metrics:
    revenue:
      period_kind: duration
      units: [USD]
      concepts:
        - {taxonomy: us-gaap, tag: RevenueFromContractWithCustomerExcludingAssessedTax}
        - {taxonomy: us-gaap, tag: Revenues}
        - {taxonomy: us-gaap, tag: RevenueFromContractWithCustomerIncludingAssessedTax}
        - {taxonomy: us-gaap, tag: SalesRevenueNet}
        - {taxonomy: us-gaap, tag: SalesRevenueGoodsNet}

    operating_income:
      period_kind: duration
      units: [USD]
      concepts:
        - {taxonomy: us-gaap, tag: OperatingIncomeLoss}
        - {taxonomy: us-gaap, tag: IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest}

    net_income:
      period_kind: duration
      units: [USD]
      concepts:
        - {taxonomy: us-gaap, tag: NetIncomeLoss}
        - {taxonomy: us-gaap, tag: NetIncomeLossAvailableToCommonStockholdersBasic}
        - {taxonomy: us-gaap, tag: ProfitLoss}

    operating_cash_flow:
      period_kind: duration
      units: [USD]
      concepts:
        - {taxonomy: us-gaap, tag: NetCashProvidedByUsedInOperatingActivities}
        - {taxonomy: us-gaap, tag: NetCashProvidedByUsedInOperatingActivitiesContinuingOperations}

    cash:
      period_kind: instant
      units: [USD]
      concepts:
        - {taxonomy: us-gaap, tag: CashAndCashEquivalentsAtCarryingValue}
        - {taxonomy: us-gaap, tag: CashCashEquivalentsAndShortTermInvestments}
        - {taxonomy: us-gaap, tag: CashAndCashEquivalentsAndRestrictedCash}

    debt:
      period_kind: instant
      units: [USD]
      concepts:
        - {taxonomy: us-gaap, tag: LongTermDebt}
        - {taxonomy: us-gaap, tag: LongTermDebtNoncurrent}
        - {taxonomy: us-gaap, tag: LongTermNotesPayable}

    shares:
      period_kind: duration
      units: [shares]
      concepts:
        - {taxonomy: us-gaap, tag: WeightedAverageNumberOfDilutedSharesOutstanding}
        - {taxonomy: us-gaap, tag: CommonStockSharesOutstanding}
